<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout · Social Penguin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #08060f;
    color: #f1f0f7;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .card {
    background: #0f0c1a;
    border: 1px solid rgba(139,92,246,0.18);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 480px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 800;
    color: #8b5cf6;
    text-align: center;
    margin-bottom: 6px;
  }

  .order-label {
    text-align: center;
    font-size: 13px;
    color: rgba(148,144,176,0.55);
    margin-bottom: 4px;
  }
  .order-title {
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 700;
    color: #f1f0f7;
    margin-bottom: 2px;
  }
  .order-price {
    text-align: center;
    font-size: 14px;
    color: #8b5cf6;
    font-weight: 600;
    margin-bottom: 32px;
  }

  /* Tab buttons */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
  }
  .tab {
    flex: 1;
    padding: 10px 4px;
    background: rgba(139,92,246,0.06);
    border: 1.5px solid rgba(139,92,246,0.15);
    border-radius: 10px;
    color: rgba(148,144,176,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:hover { border-color: rgba(139,92,246,0.4); color: #f1f0f7; }
  .tab.active {
    background: rgba(139,92,246,0.15);
    border-color: #8b5cf6;
    color: #f1f0f7;
  }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Card element */
  #card-element-wrap {
    background: rgba(139,92,246,0.05);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 16px;
  }

  /* Pay button */
  .pay-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    border: none; border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(139,92,246,0.3);
    transition: opacity 0.2s, transform 0.15s;
  }
  .pay-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .pay-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Redirect buttons */
  .redir-btn {
    width: 100%;
    padding: 16px;
    border: none; border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
  }
  .redir-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .redir-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .btn-paypal  { background: #003087; }
  .btn-cashapp { background: #00D64F; color: #000 !important; }
  .btn-venmo   { background: #008CFF; }

  /* Error */
  #payment-error {
    display: none;
    margin-top: 14px;
    padding: 11px 14px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 10px;
    color: #f87171;
    font-size: 13px;
    text-align: center;
  }

  .fine-print {
    margin-top: 24px;
    font-size: 11px;
    color: rgba(148,144,176,0.35);
    text-align: center;
    line-height: 1.7;
  }
  .fine-print a { color: rgba(148,144,176,0.45); text-decoration: none; }

  /* Loading / Error overlays */
  #loading {
    position: fixed; inset: 0;
    background: #08060f;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; z-index: 999;
  }
  #loading p { color: rgba(148,144,176,0.6); font-size: 15px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(139,92,246,0.2);
    border-top-color: #8b5cf6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #error-overlay {
    display: none; position: fixed; inset: 0;
    background: #08060f;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; z-index: 998;
  }
  #error-overlay p { color: #f87171; font-size: 15px; max-width: 320px; text-align: center; }
  #error-overlay a { color: #8b5cf6; text-decoration: none; font-weight: 600; font-size: 13px; }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .tab { font-size: 12px; padding: 9px 2px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading…</p>
</div>

<div id="error-overlay">
  <p id="error-msg">Something went wrong. Please go back and try again.</p>
  <a href="javascript:history.back()">← Go back</a>
</div>

<div class="card" id="checkout-body" style="display:none;">
  <div class="logo">Social Penguin</div>
  <div class="order-label">Your order</div>
  <div class="order-title" id="co-title"></div>
  <div class="order-price" id="co-price"></div>

  <div class="tabs">
    <button class="tab" onclick="selectTab('card')">Card</button>
    <button class="tab" onclick="selectTab('paypal')">PayPal</button>
    <button class="tab" onclick="selectTab('cashapp')">Cash App</button>
    <button class="tab" onclick="selectTab('venmo')">Venmo</button>
  </div>

  <!-- Card -->
  <div class="panel" id="panel-card">
    <div id="card-element-wrap">
      <div id="card-element"></div>
    </div>
    <button class="pay-btn" id="pay-card-btn" disabled>Pay now</button>
  </div>

  <!-- PayPal -->
  <div class="panel" id="panel-paypal">
    <button class="redir-btn btn-paypal" id="paypal-btn">Continue with PayPal</button>
  </div>

  <!-- Cash App -->
  <div class="panel" id="panel-cashapp">
    <button class="redir-btn btn-cashapp" id="cashapp-btn">Continue with Cash App</button>
  </div>

  <!-- Venmo -->
  <div class="panel" id="panel-venmo">
    <button class="redir-btn btn-venmo" id="venmo-btn">Continue with Venmo</button>
  </div>

  <div id="payment-error"></div>

  <p class="fine-print">
    Secured by <strong style="color:rgba(148,144,176,0.5)">Stripe</strong>
    &nbsp;·&nbsp;<a href="/terms">Terms</a>
    &nbsp;·&nbsp;Cancel subscriptions anytime in Settings
  </p>
</div>

<script>
var _stripe, _cardEl, _ctx, _returnUrl;

(async function() {
  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-overlay').style.display = 'flex';
  }

  var raw = sessionStorage.getItem('sp_checkout');
  if (!raw) { showError('No checkout session found. Please go back and try again.'); return; }
  try { _ctx = JSON.parse(raw); } catch(e) { showError('Invalid checkout data.'); return; }
  if (!_ctx.clientSecret) { showError('Missing payment details. Please go back.'); return; }

  document.getElementById('co-title').textContent = _ctx.title || 'Your order';
  document.getElementById('co-price').textContent = _ctx.sub || '';
  document.getElementById('pay-card-btn').textContent = _ctx.type === 'setup' ? 'Subscribe now' : 'Pay now';

  _returnUrl = 'https://socialpenguin.net/dashboard?checkout=success'
    + (_ctx.type === 'setup' ? '&finalize=1&plan=' + (_ctx.plan||'') + '&billing=' + (_ctx.billingKey||'') + '&uid=' + (_ctx.uid||'') : '');

  _stripe = Stripe('pk_live_51TILkeIPYOU07j8mjLpy1miy7sHZGoiY90akLQhgtUONG7BxVK72JfSEMhv2arOi5IG4orFM9se12QGjXoyRRtc500kUZUPoA6');

  _cardEl = _stripe.elements().create('card', {
    style: {
      base: {
        color: '#f1f0f7',
        fontFamily: 'DM Sans, sans-serif',
        fontSize: '15px',
        fontSmoothing: 'antialiased',
        '::placeholder': { color: 'rgba(148,144,176,0.4)' },
      },
      invalid: { color: '#f87171', iconColor: '#f87171' },
    },
    hidePostalCode: false,
  });
  _cardEl.mount('#card-element');
  _cardEl.on('ready', function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('checkout-body').style.display = 'block';
    selectTab('card');
  });

  // Card payment
  document.getElementById('pay-card-btn').addEventListener('click', async function() {
    var btn = this;
    var errEl = document.getElementById('payment-error');
    var orig = btn.textContent;
    btn.textContent = 'Processing…'; btn.disabled = true;
    errEl.style.display = 'none';

    var result = _ctx.type === 'setup'
      ? await _stripe.confirmCardSetup(_ctx.clientSecret, { payment_method: { card: _cardEl } })
      : await _stripe.confirmCardPayment(_ctx.clientSecret, { payment_method: { card: _cardEl } });

    if (result.error) {
      errEl.textContent = result.error.message; errEl.style.display = 'block';
      btn.textContent = orig; btn.disabled = false; return;
    }
    if (_ctx.type === 'setup' && result.setupIntent?.status === 'succeeded') {
      await fetch('/api/finalize-subscription', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ setupIntentId: result.setupIntent.id, plan: _ctx.plan, billingKey: _ctx.billingKey, uid: _ctx.uid }),
      });
    }
    sessionStorage.removeItem('sp_checkout');
    window.location.href = '/dashboard?checkout=success';
  });

  // Redirect payments (no Payment Element — avoids Stripe's method picker appearing)
  async function doRedirect(methodType, btnEl, label) {
    var errEl = document.getElementById('payment-error');
    btnEl.textContent = 'Redirecting…'; btnEl.disabled = true;
    errEl.style.display = 'none';
    try {
      var result = _ctx.type === 'setup'
        ? await _stripe.confirmSetup({
            clientSecret: _ctx.clientSecret,
            confirmParams: { return_url: _returnUrl, payment_method_data: { type: methodType } },
            redirect: 'always',
          })
        : await _stripe.confirmPayment({
            clientSecret: _ctx.clientSecret,
            confirmParams: { return_url: _returnUrl, payment_method_data: { type: methodType } },
            redirect: 'always',
          });
      if (result && result.error) {
        errEl.textContent = result.error.message; errEl.style.display = 'block';
        btnEl.textContent = label; btnEl.disabled = false;
      }
    } catch(e) {
      errEl.textContent = e.message || 'Payment failed.'; errEl.style.display = 'block';
      btnEl.textContent = label; btnEl.disabled = false;
    }
  }

  document.getElementById('paypal-btn').addEventListener('click', function() { doRedirect('paypal', this, 'Continue with PayPal'); });
  document.getElementById('cashapp-btn').addEventListener('click', function() { doRedirect('cashapp', this, 'Continue with Cash App'); });
  document.getElementById('venmo-btn').addEventListener('click', function() { doRedirect('venmo', this, 'Continue with Venmo'); });
})();

function selectTab(tab) {
  document.querySelectorAll('.tab').forEach(function(b) {
    b.classList.toggle('active', b.textContent.toLowerCase().replace(/ /g,'') === tab.replace(/ /g,'') || (tab === 'cashapp' && b.textContent === 'Cash App'));
  });
  ['card','paypal','cashapp','venmo'].forEach(function(t) {
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'card') {
    document.getElementById('pay-card-btn').disabled = false;
  }
  document.getElementById('payment-error').style.display = 'none';
}
</script>
</body>
</html>
